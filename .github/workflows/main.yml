# name of the workflow
name: etl pipeline

# define trigger
on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job1
        run: echo 'running job1'

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job2
        run: echo 'running job1'

  job3:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job3
        run: echo 'running job3'
  
  job4:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job4
        run: echo 'running job4'
  
  job5:
    runs-on: ubuntu-latest
    needs: job3
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job5
        run: echo 'running job5'

  job6:
    runs-on: ubuntu-latest
    needs: [job4, job5]
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: run job6
        run: echo 'running job6'
